name: Build DragonX Wallet APK

# 触发方式：推送到 main 分支时自动构建；也可在 Actions 页面手动点 "Run workflow"
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write   # 允许把编译好的 APK 发布到 Releases

env:
  ANDROID_NDK_VER: "22.1.7171670"   # 与 SDK gradle.properties 中 ANDROID_NDK_VERSION 一致
  RUSTUP_TOOLCHAIN: "1.65.0"        # Cargo.lock 于 2022-11 解析(libc0.2.137/cc1.0.77,edition2021)，需 Rust>=1.56；用 1.65 匹配其年代

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 JDK 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 安装 Rust 1.65.0 + 4 个安卓目标
        run: |
          set -e
          rustup toolchain install 1.65.0 --profile minimal
          rustup default 1.65.0
          rustup target add --toolchain 1.65.0 \
            armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
          rustc --version

      - name: 安装 Android NDK r22 + 平台/构建工具
        run: |
          set -e
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" \
            "ndk;${ANDROID_NDK_VER}" \
            "platforms;android-31" "platforms;android-33" \
            "build-tools;30.0.3" "build-tools;33.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: gradle-

      - name: 缓存 Cargo (Rust 依赖与编译产物)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dragonx-android-wallet-sdk/sdk-lib/target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      # 关键：换 librustzcash 后 Cargo.lock 过期，cargo 会把一批传递依赖升级到 2024 新版(要求更高 Rust)。
      # 先让 lock 与新 librustzcash 对齐，再把已知高 MSRV 的依赖用 --precise 精确压回 2022 版本，
      # 并打印完整漂移清单(committed -> final)，一次性暴露剩余需要钉的库。
      - name: 对齐并压回 Cargo 依赖版本
        working-directory: dragonx-android-wallet-sdk/sdk-lib
        run: |
          set -e
          cp Cargo.lock /tmp/committed.lock
          cargo update -p zcash_primitives -p zcash_client_backend -p zcash_client_sqlite -p zcash_proofs || true
          for pin in proc-macro2@1.0.47 subtle@2.4.1 syn@1.0.104 quote@1.0.21; do
            echo "pin ${pin%@*} -> ${pin#*@}"
            cargo update -p "${pin%@*}" --precise "${pin#*@}" || true
          done
          echo "=====DRIFT committed -> final (> 是最终被改的版本)====="
          diff <(awk '/^name =/{n=$3} /^version =/{print n, $3}' /tmp/committed.lock | sort) \
               <(awk '/^name =/{n=$3} /^version =/{print n, $3}' Cargo.lock | sort) || true
          echo "=====END DRIFT====="

      # 第一步：编译 SDK（含 Rust 引擎），发布到本机 mavenLocal 供 App 引用
      - name: 编译 SDK 并发布到 mavenLocal
        working-directory: dragonx-android-wallet-sdk
        run: |
          set -e
          chmod +x gradlew
          ./gradlew :sdk-lib:publishToMavenLocal --no-daemon --stacktrace -PRELEASE_SIGNING_ENABLED=false

      - name: 确认 SDK 已发布
        run: ls -R ~/.m2/repository/hush/android/hush-android-sdk || true

      # 第二步：编译 App（从 mavenLocal 取上面发布的 SDK），产出 release APK
      - name: 编译 App (release APK)
        working-directory: SilentDragonXAndroid
        run: |
          set -e
          chmod +x gradlew
          ./gradlew assembleZcashmainnetRelease --no-daemon --stacktrace

      - name: 收集 APK
        run: |
          set -e
          mkdir -p artifacts
          find SilentDragonXAndroid/app/build/outputs/apk -name "*.apk" -print -exec cp {} artifacts/ \;
          # 通用包（任何手机都能装）改成好认的名字
          if ls artifacts/*-release-null.apk >/dev/null 2>&1; then
            cp artifacts/*-release-null.apk "artifacts/DragonX-Wallet-v1.3.9-universal.apk"
          fi
          echo "===== 产出的 APK ====="
          ls -lh artifacts

      - name: 上传 APK 到 Actions 工件
        uses: actions/upload-artifact@v4
        with:
          name: dragonx-wallet-apks
          path: artifacts/*.apk
          if-no-files-found: error

      - name: 发布到 Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: DragonX Wallet build #${{ github.run_number }}
          body: |
            DragonX 安卓钱包 v1.3.9 (build #${{ github.run_number }})

            【本次更新】
            • 【安全】转账自动防双花：单笔转账最多只用 6 个零钱(note)。若一笔需要超过 6 个，会直接终止、不向网络提交（避免在转发节点内存池留下残留、导致双花把钱包锁死发不出去），并弹出「去合并零钱」引导——先合并再转，安全又能成功。
            • 修复「新建/切换钱包没反应」：以前在同步繁忙时点新建钱包会卡住主线程像没反应；现在改到后台执行并显示「正在创建/切换…」转圈，同步越忙等待越久但不会卡死。
            • 恢复钱包「起始高度」加引导：新钱包一键填最新高度；老钱包按创建「年/月」估算高度；并重度提醒——别留空/别填太小（会从链头同步、手机上要好几天），也别填太晚（会漏掉之前的交易和余额）。
            • 交易记录加筛选：全部 / 收款 / 转账，一键切换。
            • 交易详情显示并可复制 Tx Hash（交易ID），点任一条交易即可进入。
            • 设置→「从指定高度重扫」：当生日填成最新/填错、漏掉旧交易或余额时，填一个更早的高度从那里重新扫描找回。
            • 「备份助记词」「恢复钱包(24 词)」改为现代 Compose 界面：恢复支持一键粘贴 24 词、每格独立可改（不会再删一个串位）；备份页清晰编号展示。
            • 「切换/新建钱包」「重扫钱包」改为现代 Compose 界面（替代旧弹窗）。
            • 去掉卡住的「Loading…」遮罩：首页直接显示真实同步状态（连接中/扫描中 X% · 已扫 X/Y 块）。
            • 新增交易详情页（Compose）：交易记录点任一条即可看金额/确认数/时间/备注/交易ID（可复制）。
            • 修「交易点击像消失」：同步未完成时历史页显示「同步中，稍后显示」，不再误以为记录没了（根治办法仍是同步到100%后用「合并零钱」减少碎零钱、让同步变快）。
            • 闪退自愈：本地区块/交易数据库损坏（进程被杀等导致）时，App 在任意页面自动「清除区块数据并重启重新同步」，不再直接闪退；助记词/密钥不受影响、无需重装。
            • 降低内存不足闪退：开启 largeHeap（给重钱包更大内存），缓解零钱很多时的 OOM。
            • 扫描进度改为真实区块数：首页同步状态显示「已扫 X / 共 Y 块 + 百分比」，可看到实际扫到哪、是否在前进。
            • 全屏节点选择器（替代旧弹窗）：列出各节点实时延迟（颜色区分快/中/慢）、标记当前节点，点击即切换（无需重启）。「我的 → 选择节点」。
            • 新增「私钥恢复」：用 Sapling 私钥（secret-extended-key-main…）即可恢复钱包，无需助记词。落地页「用私钥恢复」。
            • 落地/创建页 Compose 化：创建新钱包 / 用助记词恢复(24词网格不变) / 用私钥恢复 三个入口。

            【界面现代化·全新 Jetpack Compose UI】
            本系列把又乱又难用的老界面用 Jetpack Compose（Material3 深色主题）重写，钱包内核（同步、转账、合并零钱）沿用已验证的引擎，未做改动、资金安全不受影响。

            已 Compose 化的页面：
            • 全新首页：去掉反人类的数字键盘，改为「余额卡 + 节点/同步状态 + 操作按钮（发送/收款/合并零钱/历史）+ 最近交易」的现代布局；同步进度持续可见。
            • 转账页：先填地址、再填金额（可一键「全部」）、可选备注；发送前指纹/密码确认；明确提示「已提交 ≠ 已上链，确认数请在交易记录查看」。
            • 收款页：大号二维码 + 完整地址 + 一键复制/分享。
            • 交易历史页：现代列表（收款绿色↓ / 转账红色↑、金额、时间、备注），空状态友好提示。
            • 合并零钱页：清晰说明合并原则（每笔 8 个、受控并行 6 笔、只认上链确认、自动多轮并到最少、全程只转给自己），进度显示「已确认 / 已提交」笔数，必要时一键重扫修复。
            • 「我的」设置页：现代分组列表——切换/新建钱包、备份助记词、导出私钥、选择节点、合并零钱、重扫钱包；备份/导出仍需指纹/密码验证。

            说明：日常使用界面（首页/转账/收款/历史/合并/我的）已全部 Compose 现代化；节点选择、多钱包、重扫、备份、导出延用已验证的流程。钱包内核（同步/转账/合并引擎）未改动、资金安全。创建/恢复钱包仍为上一版界面（功能正常）。

            安装：下载 **DragonX-Wallet-v1.3.0-universal.apk**（兼容所有机型）。placeholder 测试签名，需先卸载旧版再装；卸载前务必已备份 24 词助记词。
          files: artifacts/*.apk
