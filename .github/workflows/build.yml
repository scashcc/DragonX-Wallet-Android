name: Build DragonX Wallet APK

# 触发方式：推送到 main 分支时自动构建；也可在 Actions 页面手动点 "Run workflow"
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write   # 允许把编译好的 APK 发布到 Releases

env:
  ANDROID_NDK_VER: "22.1.7171670"   # 与 SDK gradle.properties 中 ANDROID_NDK_VERSION 一致
  RUSTUP_TOOLCHAIN: "1.65.0"        # Cargo.lock 于 2022-11 解析(libc0.2.137/cc1.0.77,edition2021)，需 Rust>=1.56；用 1.65 匹配其年代

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 JDK 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 安装 Rust 1.65.0 + 4 个安卓目标
        run: |
          set -e
          rustup toolchain install 1.65.0 --profile minimal
          rustup default 1.65.0
          rustup target add --toolchain 1.65.0 \
            armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
          rustc --version

      - name: 安装 Android NDK r22 + 平台/构建工具
        run: |
          set -e
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" \
            "ndk;${ANDROID_NDK_VER}" \
            "platforms;android-31" "platforms;android-33" \
            "build-tools;30.0.3" "build-tools;33.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: gradle-

      - name: 缓存 Cargo (Rust 依赖与编译产物)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dragonx-android-wallet-sdk/sdk-lib/target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      # 关键：换 librustzcash 后 Cargo.lock 过期，cargo 会把一批传递依赖升级到 2024 新版(要求更高 Rust)。
      # 先让 lock 与新 librustzcash 对齐，再把已知高 MSRV 的依赖用 --precise 精确压回 2022 版本，
      # 并打印完整漂移清单(committed -> final)，一次性暴露剩余需要钉的库。
      - name: 对齐并压回 Cargo 依赖版本
        working-directory: dragonx-android-wallet-sdk/sdk-lib
        run: |
          set -e
          cp Cargo.lock /tmp/committed.lock
          cargo update -p zcash_primitives -p zcash_client_backend -p zcash_client_sqlite -p zcash_proofs || true
          for pin in proc-macro2@1.0.47 subtle@2.4.1 syn@1.0.104 quote@1.0.21; do
            echo "pin ${pin%@*} -> ${pin#*@}"
            cargo update -p "${pin%@*}" --precise "${pin#*@}" || true
          done
          echo "=====DRIFT committed -> final (> 是最终被改的版本)====="
          diff <(awk '/^name =/{n=$3} /^version =/{print n, $3}' /tmp/committed.lock | sort) \
               <(awk '/^name =/{n=$3} /^version =/{print n, $3}' Cargo.lock | sort) || true
          echo "=====END DRIFT====="

      # 第一步：编译 SDK（含 Rust 引擎），发布到本机 mavenLocal 供 App 引用
      - name: 编译 SDK 并发布到 mavenLocal
        working-directory: dragonx-android-wallet-sdk
        run: |
          set -e
          chmod +x gradlew
          ./gradlew :sdk-lib:publishToMavenLocal --no-daemon --stacktrace -PRELEASE_SIGNING_ENABLED=false

      - name: 确认 SDK 已发布
        run: ls -R ~/.m2/repository/hush/android/hush-android-sdk || true

      # 第二步：编译 App（从 mavenLocal 取上面发布的 SDK），产出 release APK
      - name: 编译 App (release APK)
        working-directory: SilentDragonXAndroid
        run: |
          set -e
          chmod +x gradlew
          ./gradlew assembleZcashmainnetRelease --no-daemon --stacktrace

      - name: 收集 APK
        run: |
          set -e
          mkdir -p artifacts
          find SilentDragonXAndroid/app/build/outputs/apk -name "*.apk" -print -exec cp {} artifacts/ \;
          # 通用包（任何手机都能装）改成好认的名字
          if ls artifacts/*-release-null.apk >/dev/null 2>&1; then
            cp artifacts/*-release-null.apk "artifacts/DragonX-Wallet-v1.6.1-universal.apk"
          fi
          echo "===== 产出的 APK ====="
          ls -lh artifacts

      - name: 上传 APK 到 Actions 工件
        uses: actions/upload-artifact@v4
        with:
          name: dragonx-wallet-apks
          path: artifacts/*.apk
          if-no-files-found: error

      - name: 发布到 Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: DragonX Wallet build #${{ github.run_number }}
          body: |
            DragonX 安卓钱包 v1.6.1 (build #${{ github.run_number }})

            【本次更新】
            • 【根治·关键】修复「同步看着已完成、但余额一直显示『余额更新中』/转出没统计到」。靠 adb 日记实锤:某个钱包的本地区块数据库已损坏(`database disk image is malformed`),扫描每一批都失败,根本扫不动→余额算不出来、转账/收款都统计不全;而首页因为「距链顶 100 块内就算已同步」的显示规则,看着像「已同步」,其实没真正扫完。更糟的是旧的自愈逻辑有个反效果的判定:损坏后内核重试间隔会指数级拉长到约 10 分钟,而旧逻辑「45 秒没出错就清零计数」——一旦重试间隔超过 45 秒,计数每次都被清零、永远到不了阈值→损坏的库永远不会自动修复、卡死。本版改为:**只看「扫描有没有真进展」**来判断是否恢复(有进展才清零),并把自动修复阈值从 10 降到 4——损坏的库会在约 1~2 分钟内自动「清除并重新同步」重建干净(助记词/资金不受影响),而不是无限卡在 10 分钟循环里。⚠️ 你当前若卡在「余额更新中」:切到那个钱包→「我的→重扫钱包→清除并重新同步」手动重建一次最快;装上本版后以后会自动恢复。
            • 【新功能·钱包改名】「我的 → 切换/新建钱包」里每个钱包后面新增「改名」,可给每个钱包起好记的名字(只改显示名称,不影响地址和资金)。
            • 【新功能·多钱包恢复】「我的 → 切换/新建钱包」里新增「用助记词恢复 (24 词)」和「用私钥恢复 (secret-extended-key)」两个按钮。以前只有第一次打开 App(还没有任何钱包时)的引导页才有恢复入口,一旦建好钱包那个页面就再也进不去了——有多个钱包要恢复根本没地方操作。现在随时能把已有钱包作为「新的一个钱包」加进列表,并自动切换过去,不影响现有钱包。
            • 【修复·私钥恢复没有按钮】落地引导页的「用私钥恢复」以前是一行不起眼的灰字、不像按钮;现已改成和「用助记词恢复」一样的正式按钮。配合上一条,私钥恢复在「首次引导」和「切换/新建钱包」里都能清楚看到、点得到。
            • 【安全·底层加固】切换钱包时彻底清空上一个钱包的所有密钥材料再载入目标钱包——修掉一个潜在隐患:从「助记词钱包」切到「私钥钱包」时,旧钱包的种子可能残留,导致用错私钥签名。现在每次切换都精确只保留目标钱包的密钥。
            • 【新功能·检查更新】「我的」页最底部显示「当前版本 vX.Y.Z」,并自动联网对比 GitHub 最新版:有新版会提示「发现新版本」并给出「在线更新(打开发布页)」和「下载 APK」两个按钮;已是最新则显示「已是最新版本 ✓」;联网失败可点「点击检查更新」重试。**只提醒、不自动更新**,要不要更新、什么时候更新完全你自己决定;下载后照常手动覆盖安装,助记词不受影响。
            • (并入 v1.5.5)彻底修掉「最近交易/交易记录每隔几十秒闪一下」:交易列表改用和余额卡片同一套「距链顶 100 块内都算已同步」的防抖,出新块时列表不再被清空重填。
            • (并入 v1.5.4)交易列表刷新去抖:只在内容真变化时重画,不让瞬时空列表盖掉已有内容。
            • 【根治·最关键 2/2】修复「点交易记录 → 又从头同步、余额归 0」。靠 adb 日记定位:扫完后查看交易记录时,列表会随扫描器写入不停重算,造成数据库瞬时"被锁",SQLite 此时会**误报** `database disk image is malformed`(这其实是锁、不是真损坏——SDK 源码自己都注释说这是"false positive")。而旧逻辑一看到 malformed 就**立刻清空整个区块库重扫**,于是一锁就清、一清就半小时、再锁再清……死循环,余额永远 0。修法:malformed 不再"见一次就清库",改为**先让扫描器自动重试**,只有在**连续多次、确实持续**才判定真损坏才清库(并在扫描有进展时立即清零计数)。配合 v1.5.2 的见证修复,两个会把库搞坏/触发重扫的元凶就都堵死了。**装上后点交易记录不会再把钱包重置了。**
            • (并入 v1.5.2)见证表插入改 INSERT OR IGNORE,根治 `UNIQUE constraint failed: sapling_witnesses` 扫描崩。
            • 【根治·最关键】修复「动不动就从头重新同步、余额一直显示 0」的死循环根因。靠 adb 拉手机同步日志实锤:扫描时 Rust 报 `UNIQUE constraint failed: sapling_witnesses.note, sapling_witnesses.block`——见证表对 (note, block) 有唯一约束,而插入用的是普通 INSERT,**任何一次回退/重扫重新扫到已扫过的块,就会插入重复见证→报错(FailedScan)→App 把整个区块库清空→从生日检查点(3,050,000)重新扫→扫到那个块又冲突→无限循环**,余额自然一直归 0。修法:见证插入改为 `INSERT OR IGNORE`(同一 note+block 的见证是确定值,重复即相同,忽略即可),扫描从此幂等、不再因重复见证崩。这是真正卡你同步的元凶。⚠️装上后让它把这一轮重扫**安安静静走完一次**(插电、别乱点、开后台同步),扫完余额就会回来。
            • 【服务器端·关键】修复了节点 lightwalletd **反复崩溃**导致手机同步被掐断的问题(这是和手机端并发损坏并列的另一个"同步老卡/老断"的独立元凶)。原因:DragonX(Hush/Komodo 系)全节点的 RPC 返回结构和 lightwalletd 期望对不齐,源码里对 RPC 字段硬强转,字段缺失(典型:**内存池里还没上链的交易没有 height 字段**)就让整个轻钱包服务器 panic 崩掉,所有连着的手机同步流瞬间全断。已把相关类型断言全部改为安全容错写法并重新编译部署,节点不再因此崩溃。(此项是服务器端修复,装不装新 App 都已生效。)
            • 【App·健壮性】首页:换节点/重启同步时会重复订阅状态流、并可能竞态多启一个最近交易订阅(轻微泄漏)——改为重订阅前先取消旧的。
            • 【App·健壮性】快速重扫:改到同步引擎自身的作用域执行,返回上一页销毁页面也不会中途取消回退,和"完整重扫"一致。
            • 【根治·关键】修复「后台同步/合并零钱其实没真正挂在后台」的根因 Bug。深查代码发现：同步引擎(扫描器)启动时被挂在了「界面(Activity)的生命周期」上，而把 App 从最近任务里划掉、或被系统回收界面时，这个生命周期会被取消——于是即便常驻通知把进程留住了，扫描器也已经停了：后台同步形同虚设，正在进行的「合并零钱」也会因为等不到扫描器确认而永远卡住。现已把同步引擎改挂到「进程级长生命周期」，只有在主动停止(清库/换节点/自愈)或进程真正被杀时才停——后台同步与后台合并这才真正生效。配套加固：区块库损坏/数据不一致的自动修复(清库重扫、快速回退)也改到进程级执行，并对「界面已销毁时仍弹窗/提示」的情况做了空安全处理，后台自愈不会再崩。
            • 【新功能·后台同步】新增「后台同步」：开启后用一个常驻通知把 App 钉在后台，可长期挂着持续同步，且能防止系统在后台杀掉进程（进程被杀正是之前区块库被写坏的元凶）。带屏幕熄灭也能继续扫的唤醒锁。在「我的 → 后台 → 后台同步」开关控制，默认开启。⚠️ 小米/华为/OPPO 等需到系统设置里给本应用开启「自启动」并关闭「省电策略/后台限制」，后台同步才稳。
            • 【合并零钱·更稳】合并现在在后台进行，不再绑定页面：合并途中可切到别的页面、锁屏，合并都会继续；返回合并页能看到实时进度，不会从头再来。即使中途闪退/关掉 App，已提交的交易也不会丢、不会双花（每批一提交就把零钱标记为已花、写入本地，彻底防重复花）；重新打开合并页会提示「上次未完成」，点「继续合并」即可安全接着并完。
            • 【重扫·修复误判】修复「快速/完整重扫遇到数据损坏时，有时不自动修复、反而弹出看不懂的报错框」。原因：判断"是否损坏"只看了最外层错误信息，而真正的损坏提示常被包在内层。现在改为沿整条错误链查找并识别损坏异常类型，遇到损坏一律自动「清除并重新同步」（这是唯一能修复损坏区块库的方式，助记词/资金不受影响），并给出清晰说明。
            • 【根治·重要】修复「节点出错弹窗逼你选节点、点 Exit 就闪退」。原来节点临时连接失败（如合并零钱时）会弹一个老版「Select a Server」弹窗，它不可取消、唯一的另一个按钮 Exit 会直接 exitProcess 杀掉 App——一次节点抖动就逼你「选节点 或 被杀」，看着就是闪退。现在：节点出错不再弹这个挡路弹窗，改为一条不挡操作的小提示「节点连接不稳定，正在自动重连…」（内核本就会自动重连），想换节点随时去「我的→选择节点」（新版界面）；同时把那个老弹窗本身也改成永远可取消、永不杀 App（防它别处再被调起）。
            • 【根治·重要】修复「同步时点交易记录 → App 被杀、同步进度清零重头来」。靠新加的日志文件抓到真因：同步进行中订阅交易列表会触发 Paging 列表的「失效风暴」——扫描器每扫一批就刷新一次列表，列表被反复重建数千次（日志里 adding an invalidated callback 出现 2780 次）→ 主线程卡死 ANR → 系统杀进程 → 重启后从生日高度重新同步、进度全丢。修法：同步未完成时不再订阅交易列表（首页/历史显示「同步中，完成后显示」占位），同步完成后才加载——此时扫描器空闲，列表稳定、可随便看。
            • 【根治·重要】修复「同步时点开交易记录 → 同步停住 + 区块数据损坏(malformed) → 被迫清库重扫」的并发 Bug。根因：交易列表（PagedList）默认在多线程池 Dispatchers.IO 上查询数据库，而 Rust 扫描器在单线程 DATABASE_IO 上写同一个数据库文件——两套 SQLite 同时读写同一文件 → 锁冲突卡死 + 文件写坏。修法：把交易列表三个查询（全部/收款/转账）以及内部「已扫高度」只读查询全部钉到与扫描器共享的同一根 DATABASE_IO 单线程，读写严格串行、永不并发。现在同步过程中随便点交易记录都不会再让区块库损坏或中断同步。
            • 【可诊断】新增「同步日志文件」：以前 release 版同步过程完全不打日志，卡住了也看不出卡在哪。现在全程把「下载/校验/扫描」每一步连同每批耗时写进一个日志文件，随时可取出排查：`adb pull /sdcard/Android/data/dragonx.android/files/dragonx-sync.log`（同时也输出到 logcat 标签 DRGXSYNC/DRGXWALLET）。
            • 【更顺滑】扫描批大小 100→25：碎零钱很多的钱包在接近链顶时，每扫一块都要给每个未花零钱更新一次见证，一批 100 块可能要好几分钟、看着像卡死。改 25 后进度条更频繁前进、且每批都即时保存——中途被系统杀掉也只丢一点点、重开续扫不必从头。
            • 修「快速/完整重扫会失败」：当本地区块数据库已损坏（"database disk image is malformed"，多为进程被杀写坏）时，回退式重扫无法修复、必然失败。现在重扫一旦检测到这类损坏，自动升级为「清除并重新同步」（助记词/密钥不受影响、无需重装），不再卡在失败提示上。
            • 去掉吓人的同步报错弹窗：「Incompatible Block Data / Clear & Resync」和「Scan Failure / Ignore / Retry」这类看不懂的框不再弹出——遇到同步数据不一致时自动「快速回退重扫」修复（保留历史与余额），只显示一条小提示；多次仍未果才提示你手动重扫，绝不死循环。
            • 新建/恢复钱包几乎不用再同步：内置检查点更新到接近链顶(3,068,000)，新钱包从这里起步只剩约 1000 块（原来要从 3,060,000 扫约 9000 块）。
            • 【自愈】扫描遇到「FOREIGN KEY constraint failed」(链顶小重组导致的数据不一致)时，自动「快速回退约一周重扫」修复，保留历史与余额、不再弹看不懂的报错框、也不用从头同步。
            • 【安全】转账自动防双花：单笔转账最多只用 6 个零钱(note)。若一笔需要超过 6 个，会直接终止、不向网络提交（避免在转发节点内存池留下残留、导致双花把钱包锁死发不出去），并弹出「去合并零钱」引导——先合并再转，安全又能成功。
            • 修复「新建/切换钱包没反应」：以前在同步繁忙时点新建钱包会卡住主线程像没反应；现在改到后台执行并显示「正在创建/切换…」转圈，同步越忙等待越久但不会卡死。
            • 恢复钱包「起始高度」加引导：新钱包一键填最新高度；老钱包按创建「年/月」估算高度；并重度提醒——别留空/别填太小（会从链头同步、手机上要好几天），也别填太晚（会漏掉之前的交易和余额）。
            • 交易记录加筛选：全部 / 收款 / 转账，一键切换。
            • 交易详情显示并可复制 Tx Hash（交易ID），点任一条交易即可进入。
            • 设置→「从指定高度重扫」：当生日填成最新/填错、漏掉旧交易或余额时，填一个更早的高度从那里重新扫描找回。
            • 「备份助记词」「恢复钱包(24 词)」改为现代 Compose 界面：恢复支持一键粘贴 24 词、每格独立可改（不会再删一个串位）；备份页清晰编号展示。
            • 「切换/新建钱包」「重扫钱包」改为现代 Compose 界面（替代旧弹窗）。
            • 去掉卡住的「Loading…」遮罩：首页直接显示真实同步状态（连接中/扫描中 X% · 已扫 X/Y 块）。
            • 新增交易详情页（Compose）：交易记录点任一条即可看金额/确认数/时间/备注/交易ID（可复制）。
            • 修「交易点击像消失」：同步未完成时历史页显示「同步中，稍后显示」，不再误以为记录没了（根治办法仍是同步到100%后用「合并零钱」减少碎零钱、让同步变快）。
            • 闪退自愈：本地区块/交易数据库损坏（进程被杀等导致）时，App 在任意页面自动「清除区块数据并重启重新同步」，不再直接闪退；助记词/密钥不受影响、无需重装。
            • 降低内存不足闪退：开启 largeHeap（给重钱包更大内存），缓解零钱很多时的 OOM。
            • 扫描进度改为真实区块数：首页同步状态显示「已扫 X / 共 Y 块 + 百分比」，可看到实际扫到哪、是否在前进。
            • 全屏节点选择器（替代旧弹窗）：列出各节点实时延迟（颜色区分快/中/慢）、标记当前节点，点击即切换（无需重启）。「我的 → 选择节点」。
            • 新增「私钥恢复」：用 Sapling 私钥（secret-extended-key-main…）即可恢复钱包，无需助记词。落地页「用私钥恢复」。
            • 落地/创建页 Compose 化：创建新钱包 / 用助记词恢复(24词网格不变) / 用私钥恢复 三个入口。

            【界面现代化·全新 Jetpack Compose UI】
            本系列把又乱又难用的老界面用 Jetpack Compose（Material3 深色主题）重写，钱包内核（同步、转账、合并零钱）沿用已验证的引擎，未做改动、资金安全不受影响。

            已 Compose 化的页面：
            • 全新首页：去掉反人类的数字键盘，改为「余额卡 + 节点/同步状态 + 操作按钮（发送/收款/合并零钱/历史）+ 最近交易」的现代布局；同步进度持续可见。
            • 转账页：先填地址、再填金额（可一键「全部」）、可选备注；发送前指纹/密码确认；明确提示「已提交 ≠ 已上链，确认数请在交易记录查看」。
            • 收款页：大号二维码 + 完整地址 + 一键复制/分享。
            • 交易历史页：现代列表（收款绿色↓ / 转账红色↑、金额、时间、备注），空状态友好提示。
            • 合并零钱页：清晰说明合并原则（每笔 8 个、受控并行 6 笔、只认上链确认、自动多轮并到最少、全程只转给自己），进度显示「已确认 / 已提交」笔数，必要时一键重扫修复。
            • 「我的」设置页：现代分组列表——切换/新建钱包、备份助记词、导出私钥、选择节点、合并零钱、重扫钱包；备份/导出仍需指纹/密码验证。

            说明：日常使用界面（首页/转账/收款/历史/合并/我的）已全部 Compose 现代化；节点选择、多钱包、重扫、备份、导出延用已验证的流程。钱包内核（同步/转账/合并引擎）未改动、资金安全。创建/恢复钱包仍为上一版界面（功能正常）。

