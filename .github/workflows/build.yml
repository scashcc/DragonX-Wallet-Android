name: Build DragonX Wallet APK

# 触发方式：推送到 main 分支时自动构建；也可在 Actions 页面手动点 "Run workflow"
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write   # 允许把编译好的 APK 发布到 Releases

env:
  ANDROID_NDK_VER: "22.1.7171670"   # 与 SDK gradle.properties 中 ANDROID_NDK_VERSION 一致
  RUSTUP_TOOLCHAIN: "1.65.0"        # Cargo.lock 于 2022-11 解析(libc0.2.137/cc1.0.77,edition2021)，需 Rust>=1.56；用 1.65 匹配其年代

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 JDK 11 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 安装 Rust 1.65.0 + 4 个安卓目标
        run: |
          set -e
          rustup toolchain install 1.65.0 --profile minimal
          rustup default 1.65.0
          rustup target add --toolchain 1.65.0 \
            armv7-linux-androideabi aarch64-linux-android i686-linux-android x86_64-linux-android
          rustc --version

      - name: 安装 Android NDK r22 + 平台/构建工具
        run: |
          set -e
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" \
            "ndk;${ANDROID_NDK_VER}" \
            "platforms;android-31" "platforms;android-33" \
            "build-tools;30.0.3" "build-tools;33.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VER}" >> "$GITHUB_ENV"

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: gradle-

      - name: 缓存 Cargo (Rust 依赖与编译产物)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dragonx-android-wallet-sdk/sdk-lib/target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      # 关键：换 librustzcash 后 Cargo.lock 过期，cargo 会把一批传递依赖升级到 2024 新版(要求更高 Rust)。
      # 先让 lock 与新 librustzcash 对齐，再把已知高 MSRV 的依赖用 --precise 精确压回 2022 版本，
      # 并打印完整漂移清单(committed -> final)，一次性暴露剩余需要钉的库。
      - name: 对齐并压回 Cargo 依赖版本
        working-directory: dragonx-android-wallet-sdk/sdk-lib
        run: |
          set -e
          cp Cargo.lock /tmp/committed.lock
          cargo update -p zcash_primitives -p zcash_client_backend -p zcash_client_sqlite -p zcash_proofs || true
          for pin in proc-macro2@1.0.47 subtle@2.4.1 syn@1.0.104 quote@1.0.21; do
            echo "pin ${pin%@*} -> ${pin#*@}"
            cargo update -p "${pin%@*}" --precise "${pin#*@}" || true
          done
          echo "=====DRIFT committed -> final (> 是最终被改的版本)====="
          diff <(awk '/^name =/{n=$3} /^version =/{print n, $3}' /tmp/committed.lock | sort) \
               <(awk '/^name =/{n=$3} /^version =/{print n, $3}' Cargo.lock | sort) || true
          echo "=====END DRIFT====="

      # 第一步：编译 SDK（含 Rust 引擎），发布到本机 mavenLocal 供 App 引用
      - name: 编译 SDK 并发布到 mavenLocal
        working-directory: dragonx-android-wallet-sdk
        run: |
          set -e
          chmod +x gradlew
          ./gradlew :sdk-lib:publishToMavenLocal --no-daemon --stacktrace -PRELEASE_SIGNING_ENABLED=false

      - name: 确认 SDK 已发布
        run: ls -R ~/.m2/repository/hush/android/hush-android-sdk || true

      # 第二步：编译 App（从 mavenLocal 取上面发布的 SDK），产出 release APK
      - name: 编译 App (release APK)
        working-directory: SilentDragonXAndroid
        run: |
          set -e
          chmod +x gradlew
          ./gradlew assembleZcashmainnetRelease --no-daemon --stacktrace

      - name: 收集 APK
        run: |
          set -e
          mkdir -p artifacts
          find SilentDragonXAndroid/app/build/outputs/apk -name "*.apk" -print -exec cp {} artifacts/ \;
          # 通用包（任何手机都能装）改成好认的名字
          if ls artifacts/*-release-null.apk >/dev/null 2>&1; then
            cp artifacts/*-release-null.apk "artifacts/DragonX-Wallet-v1.1.6-universal.apk"
          fi
          echo "===== 产出的 APK ====="
          ls -lh artifacts

      - name: 上传 APK 到 Actions 工件
        uses: actions/upload-artifact@v4
        with:
          name: dragonx-wallet-apks
          path: artifacts/*.apk
          if-no-files-found: error

      - name: 发布到 Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: DragonX Wallet build #${{ github.run_number }}
          body: |
            DragonX 安卓钱包 v1.1.6 (build #${{ github.run_number }})

            本次更新（重点修复「大额转不出去」+ 新增合并零钱）：
            • 【根因修复】查清了大额转账发不出去的真正原因：DragonX 节点的矿工对「输入≥50 个的隐私交易」每个区块只打包 1 笔，且手续费过低的会被直接跳过。矿池打款用户钱包里有几百个零钱碎片，转大额时会把几百个塞进一笔，必被卡住、约 12 分钟后过期失败。
            • 单笔交易输入数封顶 45 个（低于节点 50 的阈值）并优先选用大额 note —— 普通转账现在是「正常交易」，矿工会立即打包。
            • 手续费由 0.00001 提高到 0.0001 DRGX（与节点对隐私交易要求的最低费一致），不再因费率过低被矿工忽略而过期。
            • 【新功能】合并零钱（我的 → 合并零钱）：一键全自动把成百上千个零钱碎片合并成几个大额，合并笔数按你的零钱数量自动决定，全程自动、无需逐笔操作。矿池打款用户请先合并零钱，之后即可正常转大额。
            • 转账若因「零钱过于分散」失败，会明确提示去「合并零钱」，不再误报为余额不足。

            使用顺序（矿池/多笔小额到账的用户）：先完成同步 → 我的 → 合并零钱 → 等几分钟确认 → 再正常转账。

            安装：下载 **DragonX-Wallet-v1.1.6-universal.apk**（兼容所有机型）。placeholder 测试签名，需先卸载旧版再装；卸载前务必已备份 24 词助记词。
          files: artifacts/*.apk
